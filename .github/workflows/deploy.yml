# .github/workflows/deploy.yml (42chess-team/frontend 레포)

name: Frontend Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    concurrency:
      group: "frontend-deploy-main"
      cancel-in-progress: true
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        env:
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          rsync -a --delete dist/ "$DEPLOY_DIR/"
