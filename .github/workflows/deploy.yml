# .github/workflows/deploy.yml (42chess-team/frontend 레포)

name: Frontend Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          rm -rf /opt/42chess/frontend/dist/*
          cp -r dist/* /opt/42chess/frontend/dist/
