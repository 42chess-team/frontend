# .github/workflows/deploy.yml (42chess-team/frontend 레포)

name: Frontend Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    concurrency:
      group: "frontend-deploy-main"
      cancel-in-progress: true
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          DEPLOY_DIR="${{ secrets.DEPLOY_DIR }}"
          TEMP_DIR="${DEPLOY_DIR}/dist_new_$$"
          cp -r dist "$TEMP_DIR"
          mv "${DEPLOY_DIR}/dist" "${DEPLOY_DIR}/dist_old" 2>/dev/null || true
          mv "$TEMP_DIR" "${DEPLOY_DIR}/dist"
          rm -rf "${DEPLOY_DIR}/dist_old"
